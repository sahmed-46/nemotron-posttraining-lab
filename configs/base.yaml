project_name: nemotron-posttraining-lab
seed: 42
output_dir: outputs

model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  trust_remote_code: false
  torch_dtype: float16
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05

data:
  # Primary: GSM8K for local dev. Switch to nvidia/Nemotron-3-Nano-RL-Training-Blend on GPU cluster.
  dataset_name: gsm8k
  dataset_config: main
  train_split: train
  eval_split: test
  max_train_samples: 512
  max_eval_samples: 128
  processed_dir: data/processed

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  num_train_epochs: 1
  max_seq_length: 512
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  bf16: false
  fp16: true

wandb:
  enabled: false
  project: nemotron-posttraining-lab
